server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/esprit_activities?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:please_change_this_to_a_secure_random_string_minimum_32_chars}
    expires-in: ${JWT_EXPIRES_IN:7d}
  security:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
    login:
      max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
      lock-minutes: ${LOGIN_LOCK_MINUTES:15}
  notifications:
    enabled: ${ENABLE_NOTIFICATIONS:true}
    email-enabled: ${ENABLE_EMAIL_NOTIFICATIONS:false}
